syntax = "proto3";

package ua.gov.diia.types.ds.molecules;

import "designSystem/atoms/buttonAction.proto";
import "designSystem/atoms/smallIconAtm.proto";
import "ui.proto";

option java_multiple_files = true;
option java_package = "ua.gov.diia.types.ds.molecules";

/**
 * @see https://diia.atlassian.net/wiki/spaces/DIIA/pages/2941222915/photoUploadMlc
 */
message PhotoUploadMlc {
  string componentId = 1;
  optional ua.gov.diia.types.ds.PaddingMode paddingMode = 2;
  optional string inputCode = 3;
  optional bool mandatory = 4;
  optional ua.gov.diia.types.ds.atoms.SmallIconAtm iconCenter = 5;
  optional string title = 6;
  optional string description = 7;
  optional ua.gov.diia.types.ds.atoms.SmallIconAtm iconRight = 8;
  optional ua.gov.diia.types.ds.atoms.button.ButtonAction action = 9;
}
