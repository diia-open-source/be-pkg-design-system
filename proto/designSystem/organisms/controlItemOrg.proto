syntax = "proto3";

package ua.gov.diia.types.ds.organisms;

import "designSystem/atoms/checkBoxSquareAtm.proto";
import "designSystem/atoms/radioBtnAtm.proto";
import "designSystem/molecules/transparentInfoCardMlc.proto";
import "ui.proto";

option java_multiple_files = true;
option java_package = "ua.gov.diia.types.ds.organisms";

enum ControlItemOrgSizeType {
  small = 0;
  medium = 1;
}

enum ControlItemOrgAlignmentType {
  top = 0;
  center = 1;
}

message ControlItemOrgSelectorItem {
  optional ua.gov.diia.types.ds.atoms.CheckBoxSquareAtm checkBoxSquareAtm = 1;
  optional ua.gov.diia.types.ds.atoms.RadioBtnAtm radioBtnAtm = 2;
}

/**
 * @see https://diia.atlassian.net/wiki/spaces/DIIA/pages/2853470209/controlItemOrg
 */
message ControlItemOrg {
  string componentId = 1;
  ua.gov.diia.types.ds.PaddingMode paddingMode = 2;
  ControlItemOrgSelectorItem selectorItem = 3;
  ControlItemOrgSizeType size = 4;
  ControlItemOrgAlignmentType alignment = 5;
  ControlItemOrgBodyItem item = 6;
  optional string id = 7;
  optional string dataJson = 8;
  optional bool isSelected = 9;
  optional bool isEnabled = 10;
  string innerSideSpacer = 11;
}

message ControlItemOrgBodyItem {
  optional ua.gov.diia.types.ds.molecules.TransparentInfoCardMlc transparentInfoCard = 1;
}
