syntax = "proto3";

package ua.gov.diia.types.ds.molecules;

import "designSystem/atoms/iconAtm.proto";
import "designSystem/atoms/textParameterAtm.proto";
import "ui.proto";

option java_multiple_files = true;
option java_package = "ua.gov.diia.types.ds.molecules";

message TableMainHeadingMlc {
  string label = 1;
  optional ua.gov.diia.types.ds.atoms.IconAtm icon = 2;
  optional string description = 3;
  optional string componentId = 4;
  optional ua.gov.diia.types.ds.PaddingMode paddingMode = 5;
  repeated ua.gov.diia.types.ds.atoms.TextParameterAtm parameters = 6;
}
