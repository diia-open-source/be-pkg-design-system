syntax = "proto3";

package ua.gov.diia.types.ds.atoms;

import "ui.proto";

option java_multiple_files = true;
option java_package = "ua.gov.diia.types.ds.atoms";

/**
 * @see https://diia.atlassian.net/wiki/spaces/DIIA/pages/2850619495/checkBoxSquareAtm
 */
message CheckBoxSquareAtm {
  string componentId = 1;
  optional ua.gov.diia.types.ds.PaddingMode paddingMode = 2;
  optional bool isSelected = 3;
  optional bool isEnabled = 4;
}
